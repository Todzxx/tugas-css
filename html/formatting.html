<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Text Formatting CSS</title>
    <link rel="stylesheet" href="../css/formatting.css" />
  </head>
  <body>
    <h1>Contoh Text Formatting</h1>

    <p class="satu">
      Ini contoh paragraf dengan warna hijau, ada indentasi, dan line-height
      lebih lebar sehingga mudah dibaca.
    </p>

    <p class="dua">
      Ini contoh paragraf dengan spasi antar huruf, spasi antar kata, dan
      underline.
    </p>

    <p>
      Klik <a href="#">link ini</a> untuk melihat teks link tanpa garis bawah.
    </p>
  </body>
</html>
