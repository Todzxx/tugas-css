<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Contoh 6 Selektor CSS</title>
    <link rel="stylesheet" href="../css/selektor.css" />
  </head>
  <body>
    <!-- Selektor ID -->
    <h1 id="judul">Halo, ini Judul dengan ID</h1>

    <!-- Selektor Tag -->
    <p>Ini paragraf pertama (kena selektor tag p).</p>

    <!-- Selektor Class -->
    <p class="highlight">Ini paragraf dengan class highlight.</p>

    <!-- Selektor Atribut -->
    <form>
      <input type="text" placeholder="Nama (border hijau)" />
      <br /><br />
      <input type="password" placeholder="Password (tidak kena style)" />
    </form>

    <!-- Selektor Universal + Pseudo -->
    <p>Klik <a href="#">link ini</a> untuk melihat efek hover.</p>
  </body>
</html>
