<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Internal CSS</title>

    <!-- Internal CSS ditulis di dalam tag <style> -->
    <style>
      /* Mengatur gaya untuk elemen body */
      body {
        background-color: #f2f2f2; /* Memberikan warna abu muda pada latar belakang */
      }

      /* Mengatur gaya untuk elemen h1 (judul) */
      h1 {
        color: blue; /* Warna teks biru */
        text-align: center; /* Posisi teks berada di tengah */
      }

      /* Mengatur gaya untuk elemen paragraf (p) */
      p {
        font-size: 18px; /* Ukuran teks 18px */
        color: #333; /* Warna teks abu tua */
      }
    </style>
  </head>
  <body>
    <!-- Judul halaman -->
    <h1>Halo, ini judul</h1>

    <!-- Paragraf contoh -->
    <p>Ini paragraf dengan Internal CSS</p>
  </body>
</html>
