<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Position CSS</title>
    <link rel="stylesheet" href="../css/position.css" />
  </head>
  <body>
    <h1>Contoh Position di CSS</h1>

    <div class="static">Ini static</div>
    <div class="relative">Ini relative</div>

    <div class="container">
      <div class="absolute">Ini absolute (dalam container)</div>
    </div>

    <div style="height: 800px">
      <div class="sticky">Ini sticky (tetap di atas saat scroll)</div>
    </div>

    <div class="fixed">Ini fixed (pojok kanan bawah)</div>
  </body>
</html>
